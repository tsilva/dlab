# @package _global_
defaults:
  - override /dataset: mnist
  - override /model: mlp
  - override /optimizer: adam

task: classification
run:
  stage: 01_mlp_basics
  study: mlp_top3_no_bn_1024_d3_do0p1
  goal: Confirm the best non-batch-norm high-capacity MLP across seeds.
  tags: [roadmap, mlp, mnist, high-capacity, no-batch-norm, confirmation]
model:
  params:
    hidden_dim: 1024
    num_layers: 3
    dropout: 0.1
    batch_norm: false
optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0001
dataset:
  batch_size: 512
trainer:
  max_epochs: 50
early_stopping:
  enabled: true
  monitor: val/loss
  mode: min
  patience: 5
  min_delta: 0.0005
wandb:
  enabled: false
