# @package _global_
name: mlp_regularization_confirm_sweep
experiment: mnist_mlp_research
train_script: train.py
stop_on_failure: true
run:
  stage: 01_mlp_basics
  study: mlp_regularization_confirm
  question: Which dropout and weight decay setting best regularizes the confirmed MNIST MLP architecture?
  hypothesis: Light dropout or light weight decay should improve validation loss, while combining strong dropout with strong weight decay should underfit.
  expected_pattern: Validation loss should be lowest for light regularization and rise when dropout or weight decay becomes too strong.
  controlled_variables: [dataset, model_architecture, optimizer, learning_rate, batch_size]
  changed_variables: [model.params.dropout, optimizer.weight_decay, seed]
  tags: [roadmap, regularization, weight-decay, dropout, seed-variance, confirmation]
parameters:
  model:
    params:
      hidden_dim:
        - 512
      num_layers:
        - 1
      dropout:
        - 0.0
        - 0.05
        - 0.1
        - 0.2
  optimizer:
    name:
      - adam
    lr:
      - 0.0003
    weight_decay:
      - 0.0
      - 0.00001
      - 0.0001
      - 0.001
  dataset:
    batch_size:
      - 64
  seed:
    - 1
    - 2
    - 3
