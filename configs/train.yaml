defaults:
  - dataset: mnist
  - model: mlp
  - optimizer: adam
  - trainer: default
  - _self_
  - experiment: null
  - launcher: local

experiment_name: null
seed: 1337
task: classification

run:
  study: baseline
  stage: null
  group: null
  sweep_name: null
  sweep_index: null
  question: null
  hypothesis: null
  goal: null
  expected_pattern: null
  controlled_variables: []
  changed_variables: []
  tags: []

paths:
  outputs_dir: outputs
  reports_dir: reports

runtime:
  float32_matmul_precision: null

loss:
  name: cross_entropy
  beta: 1.0
  label_smoothing: 0.0

weight_averaging:
  name: none
  ema_decay: 0.999
  update_every_n_steps: 1
  update_starting_at_epoch: null

checkpoint:
  monitor: val/loss
  mode: min
  save_top_k: 1

early_stopping:
  enabled: false
  monitor: val/loss
  mode: min
  patience: 5
  min_delta: 0.0005
  check_finite: true
  verbose: true

evaluation:
  test:
    enabled: false
    ckpt_path: best
    weights_only: false
  error_analysis:
    enabled: false
    max_examples: 128

wandb:
  enabled: true
  project: dlab
  entity: null
  mode: online
  log_model: false
  job_type: train
  log_code: false
  log_artifacts: true
  log_tables: true
  table_max_examples: 32
  watch:
    enabled: false
    log: gradients
    log_freq: 100

litlogger:
  enabled: false
  root_dir: outputs/litlogger
  teamspace: null
  log_model: false
  save_logs: true

reports:
  enabled: true

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: outputs/hydra_multirun
    subdir: ${hydra.job.num}
