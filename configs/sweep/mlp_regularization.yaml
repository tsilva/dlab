# @package _global_
name: mlp_regularization_sweep
experiment: mnist_mlp_research
train_script: train.py
stop_on_failure: true
run:
  stage: 01_mlp_basics
  study: mlp_regularization
  question: How do dropout, weight decay, optimizer choice, and batch size interact?
  hypothesis: Regularization should improve validation loss when capacity is high, but too much should slow learning.
  expected_pattern: The best runs should balance dropout or weight decay with a batch size that keeps optimization stable.
  controlled_variables: [dataset, model_family, learning_rate, seed]
  changed_variables: [model.params.dropout, optimizer.name, optimizer.weight_decay, dataset.batch_size]
  tags: [roadmap, regularization, batch-size]
parameters:
  model:
    params:
      hidden_dim:
        - 256
      num_layers:
        - 2
      dropout:
        - 0.0
        - 0.05
        - 0.1
        - 0.2
        - 0.3
  optimizer:
    name:
      - adam
      - adamw
    lr:
      - 0.001
    weight_decay:
      - 0.0
      - 0.01
  dataset:
    batch_size:
      - 64
      - 128
      - 256
