# @package _global_
defaults:
  - override /dataset: mnist
  - override /model: mlp
  - override /optimizer: adam

task: classification
run:
  stage: 01_mlp_basics
  study: mlp_top2_bn_1024_d3_do0p2
  goal: Confirm the second-best high-capacity batch-norm MLP across seeds.
  tags: [roadmap, mlp, mnist, high-capacity, batch-norm, confirmation]
model:
  params:
    hidden_dim: 1024
    num_layers: 3
    dropout: 0.2
    batch_norm: true
optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0001
dataset:
  batch_size: 512
trainer:
  max_epochs: 50
early_stopping:
  enabled: true
  monitor: val/loss
  mode: min
  patience: 5
  min_delta: 0.0005
wandb:
  enabled: false
