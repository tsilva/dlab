# @package _global_
name: mlp_arch_sweep
experiment: mnist_mlp_research
train_script: train.py
stop_on_failure: true
parameters:
  optimizer:
    lr:
      - 0.001
  model:
    params:
      hidden_dim:
        - 64
        - 128
        - 256
        - 512
        - 1024
      num_layers:
        - 1
        - 2
        - 3
        - 4
      dropout:
        - 0.0
        - 0.1
