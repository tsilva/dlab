# @package _global_
defaults:
  - override /dataset: mnist
  - override /model: vqvae
  - override /optimizer: adam

task: vqvae
run:
  study: baseline
dataset:
  normalize: false
loss:
  name: mse
model:
  params:
    hidden_dim: 64
    embedding_dim: 32
    num_embeddings: 128
    commitment_cost: 0.25
